<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>

    <!-- Background gradient: deep indigo space -->
    <radialGradient id="bg-radial" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a0f3a"/>
      <stop offset="60%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#070510"/>
    </radialGradient>

    <!-- Tunnel/warp vanishing point glow -->
    <radialGradient id="warp-glow" cx="50%" cy="58%" r="30%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0f0a1e" stop-opacity="0"/>
    </radialGradient>

    <!-- Player glow filter -->
    <filter id="player-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gold orb glow -->
    <filter id="orb-gold-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gray orb glow (cold) -->
    <filter id="orb-gray-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow: purple/fuchsia -->
    <filter id="text-glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle grid line glow -->
    <filter id="grid-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Motion trail blur -->
    <filter id="trail-blur" x="-20%" y="-80%" width="160%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5 2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Score text glow: white-ish -->
    <filter id="score-glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Timer pill glow -->
    <filter id="pill-glow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sparkle star bright core -->
    <filter id="sparkle-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gold orb gradient -->
    <radialGradient id="gold-orb-grad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff7c0"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>

    <!-- Bad orb gradient -->
    <radialGradient id="bad-orb-grad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </radialGradient>

    <!-- Player gradient -->
    <radialGradient id="player-grad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="45%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>

  </defs>

  <!-- === BACKGROUND === -->
  <rect width="480" height="300" fill="url(#bg-radial)"/>
  <!-- Warp singularity ambient -->
  <rect width="480" height="300" fill="url(#warp-glow)"/>

  <!-- === PERSPECTIVE WARP GRID === -->
  <!-- Converging to vanishing point at ~(240, 175) -->
  <!-- Horizontal receding lines (floor) -->
  <g filter="url(#grid-glow)" opacity="0.55">
    <!-- Horizon band -->
    <line x1="0" y1="175" x2="480" y2="175" stroke="#3b1d6e" stroke-width="0.6" opacity="0.5"/>

    <!-- Receding horizontals below horizon -->
    <line x1="0" y1="195" x2="480" y2="195" stroke="#2d1655" stroke-width="0.7"/>
    <line x1="0" y1="220" x2="480" y2="220" stroke="#2d1655" stroke-width="0.9"/>
    <line x1="0" y1="250" x2="480" y2="250" stroke="#2d1655" stroke-width="1.1"/>
    <line x1="0" y1="285" x2="480" y2="285" stroke="#2d1655" stroke-width="1.3"/>

    <!-- Converging verticals from vanishing point (240,175) to bottom corners -->
    <line x1="240" y1="175" x2="-40" y2="320" stroke="#4c1d95" stroke-width="0.5" opacity="0.6"/>
    <line x1="240" y1="175" x2="30" y2="320" stroke="#4c1d95" stroke-width="0.5" opacity="0.6"/>
    <line x1="240" y1="175" x2="80" y2="320" stroke="#4c1d95" stroke-width="0.6" opacity="0.7"/>
    <line x1="240" y1="175" x2="120" y2="320" stroke="#4c1d95" stroke-width="0.6" opacity="0.7"/>
    <line x1="240" y1="175" x2="155" y2="320" stroke="#4c1d95" stroke-width="0.7" opacity="0.8"/>
    <line x1="240" y1="175" x2="185" y2="320" stroke="#5b21b6" stroke-width="0.7" opacity="0.8"/>
    <line x1="240" y1="175" x2="210" y2="320" stroke="#5b21b6" stroke-width="0.8"/>
    <!-- Center vertical -->
    <line x1="240" y1="175" x2="240" y2="320" stroke="#6d28d9" stroke-width="0.9"/>
    <!-- Right cluster (mirrored) -->
    <line x1="240" y1="175" x2="270" y2="320" stroke="#5b21b6" stroke-width="0.8"/>
    <line x1="240" y1="175" x2="295" y2="320" stroke="#5b21b6" stroke-width="0.7" opacity="0.8"/>
    <line x1="240" y1="175" x2="325" y2="320" stroke="#4c1d95" stroke-width="0.7" opacity="0.8"/>
    <line x1="240" y1="175" x2="360" y2="320" stroke="#4c1d95" stroke-width="0.6" opacity="0.7"/>
    <line x1="240" y1="175" x2="400" y2="320" stroke="#4c1d95" stroke-width="0.6" opacity="0.7"/>
    <line x1="240" y1="175" x2="450" y2="320" stroke="#4c1d95" stroke-width="0.5" opacity="0.6"/>
    <line x1="240" y1="175" x2="520" y2="320" stroke="#4c1d95" stroke-width="0.5" opacity="0.6"/>

    <!-- Hot magenta accent at center vertical -->
    <line x1="240" y1="175" x2="240" y2="320" stroke="#c026d3" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Horizon glow strip -->
  <rect x="0" y="171" width="480" height="8" fill="#7c3aed" opacity="0.12" filter="url(#grid-glow)"/>

  <!-- === MOTION TRAILS (behind player at ~240,148) === -->
  <ellipse cx="200" cy="149" rx="22" ry="9" fill="#a21caf" opacity="0.18" filter="url(#trail-blur)"/>
  <ellipse cx="216" cy="149" rx="18" ry="8" fill="#c026d3" opacity="0.28" filter="url(#trail-blur)"/>
  <ellipse cx="228" cy="148" rx="13" ry="7" fill="#d946ef" opacity="0.42" filter="url(#trail-blur)"/>

  <!-- === GOLD ORBS (good) === -->
  <g filter="url(#orb-gold-glow)">
    <circle cx="68" cy="118" r="11" fill="url(#gold-orb-grad)"/>
    <circle cx="68" cy="118" r="11" fill="#fbbf24" opacity="0.25"/>
  </g>
  <g filter="url(#orb-gold-glow)">
    <circle cx="130" cy="155" r="9" fill="url(#gold-orb-grad)"/>
    <circle cx="130" cy="155" r="9" fill="#fbbf24" opacity="0.2"/>
  </g>
  <g filter="url(#orb-gold-glow)">
    <circle cx="388" cy="105" r="12" fill="url(#gold-orb-grad)"/>
    <circle cx="388" cy="105" r="12" fill="#fbbf24" opacity="0.25"/>
  </g>
  <g filter="url(#orb-gold-glow)">
    <circle cx="340" cy="162" r="8" fill="url(#gold-orb-grad)"/>
    <circle cx="340" cy="162" r="8" fill="#fbbf24" opacity="0.2"/>
  </g>
  <g filter="url(#orb-gold-glow)">
    <circle cx="310" cy="78" r="10" fill="url(#gold-orb-grad)"/>
    <circle cx="310" cy="78" r="10" fill="#fbbf24" opacity="0.2"/>
  </g>

  <!-- === GRAY / BAD ORBS === -->
  <g filter="url(#orb-gray-glow)">
    <circle cx="90" cy="78" r="10" fill="url(#bad-orb-grad)"/>
    <circle cx="90" cy="78" r="10" fill="#9ca3af" opacity="0.15"/>
  </g>
  <g filter="url(#orb-gray-glow)">
    <circle cx="170" cy="100" r="8" fill="url(#bad-orb-grad)"/>
    <circle cx="170" cy="100" r="8" fill="#9ca3af" opacity="0.12"/>
  </g>
  <g filter="url(#orb-gray-glow)">
    <circle cx="415" cy="148" r="11" fill="url(#bad-orb-grad)"/>
    <circle cx="415" cy="148" r="11" fill="#9ca3af" opacity="0.15"/>
  </g>

  <!-- === PLAYER === -->
  <g filter="url(#player-glow)">
    <circle cx="240" cy="148" r="28" fill="#d946ef" opacity="0.12"/>
    <circle cx="240" cy="148" r="20" fill="#d946ef" opacity="0.22"/>
    <circle cx="240" cy="148" r="14" fill="url(#player-grad)"/>
    <circle cx="240" cy="148" r="8" fill="#f0abfc" opacity="0.6"/>
  </g>

  <!-- Player sparkle/star center -->
  <g filter="url(#sparkle-glow)">
    <polygon points="240,138 242,148 240,158 238,148" fill="#ffffff" opacity="0.95"/>
    <polygon points="230,148 240,146 250,148 240,150" fill="#ffffff" opacity="0.95"/>
    <polygon points="233,141 241,148 247,155 239,148" fill="#ffffff" opacity="0.55"/>
    <polygon points="247,141 240,148 233,155 240,148" fill="#ffffff" opacity="0.55"/>
    <circle cx="240" cy="148" r="2.5" fill="#ffffff"/>
  </g>

  <!-- === HUD: FLASH RUN title (top-left) === -->
  <g filter="url(#text-glow)">
    <text x="16" y="34" font-family="'Arial Black', 'Arial', sans-serif"
          font-weight="900" font-size="22" letter-spacing="4"
          fill="#7e22ce" opacity="0.7">FLASH</text>
    <text x="16" y="56" font-family="'Arial Black', 'Arial', sans-serif"
          font-weight="900" font-size="22" letter-spacing="6"
          fill="#7e22ce" opacity="0.7">RUN</text>
    <text x="16" y="34" font-family="'Arial Black', 'Arial', sans-serif"
          font-weight="900" font-size="22" letter-spacing="4"
          fill="#e879f9">FLASH</text>
    <text x="16" y="56" font-family="'Arial Black', 'Arial', sans-serif"
          font-weight="900" font-size="22" letter-spacing="6"
          fill="#e879f9">RUN</text>
  </g>
  <line x1="16" y1="61" x2="110" y2="61" stroke="#d946ef" stroke-width="1.5" opacity="0.6" filter="url(#grid-glow)"/>

  <!-- === HUD: SCORE (top-right) === -->
  <g filter="url(#score-glow)">
    <text x="464" y="28" font-family="'Courier New', 'Courier', monospace"
          font-weight="700" font-size="10" letter-spacing="2"
          text-anchor="end" fill="#c4b5fd" opacity="0.85">SCORE</text>
    <text x="464" y="46" font-family="'Courier New', 'Courier', monospace"
          font-weight="700" font-size="20" letter-spacing="1"
          text-anchor="end" fill="#f0e6ff">240</text>
  </g>

  <!-- === HUD: Timer pill (bottom center) === -->
  <g filter="url(#pill-glow)">
    <rect x="195" y="272" width="90" height="22" rx="11" ry="11"
          fill="#1a0f3a" stroke="#d946ef" stroke-width="1.2" opacity="0.95"/>
    <text x="240" y="287" font-family="'Courier New', 'Courier', monospace"
          font-weight="700" font-size="12" letter-spacing="1"
          text-anchor="middle" fill="#f0e6ff">⏱ 32s</text>
  </g>

  <!-- === SUBTLE STAR FIELD (background depth) === -->
  <g opacity="0.45">
    <circle cx="45" cy="20" r="0.8" fill="#e0d7ff"/>
    <circle cx="112" cy="8" r="0.6" fill="#e0d7ff"/>
    <circle cx="198" cy="15" r="1" fill="#e0d7ff"/>
    <circle cx="267" cy="6" r="0.7" fill="#e0d7ff"/>
    <circle cx="350" cy="18" r="0.8" fill="#e0d7ff"/>
    <circle cx="430" cy="9" r="0.6" fill="#e0d7ff"/>
    <circle cx="460" cy="28" r="0.9" fill="#e0d7ff"/>
    <circle cx="22" cy="50" r="0.5" fill="#c4b5fd"/>
    <circle cx="75" cy="38" r="0.7" fill="#c4b5fd"/>
    <circle cx="155" cy="45" r="0.5" fill="#c4b5fd"/>
    <circle cx="330" cy="38" r="0.6" fill="#c4b5fd"/>
    <circle cx="415" cy="55" r="0.8" fill="#c4b5fd"/>
    <circle cx="470" cy="70" r="0.5" fill="#c4b5fd"/>
    <circle cx="55" cy="130" r="0.5" fill="#9f7aea" opacity="0.5"/>
    <circle cx="420" cy="90" r="0.6" fill="#9f7aea" opacity="0.5"/>
    <circle cx="460" cy="125" r="0.4" fill="#9f7aea" opacity="0.5"/>
  </g>

  <!-- === FLOATING PARTICLE SPARKS near player === -->
  <g opacity="0.7" filter="url(#sparkle-glow)">
    <circle cx="257" cy="136" r="1.5" fill="#f0abfc"/>
    <circle cx="264" cy="142" r="1" fill="#fde68a"/>
    <circle cx="222" cy="140" r="1.2" fill="#f0abfc"/>
    <circle cx="215" cy="152" r="0.8" fill="#e879f9"/>
    <circle cx="258" cy="157" r="1" fill="#fde68a"/>
    <circle cx="248" cy="131" r="1.3" fill="#ffffff" opacity="0.8"/>
  </g>

</svg>