    <circle cx="440" cy="12"  r="1.3" fill="#ffd0e0" opacity="0.85"/>
    <circle cx="462" cy="38"  r="0.8" fill="#ffb3cc" opacity="0.75"/>
    <circle cx="430" cy="50"  r="0.7" fill="#ff6b9d" opacity="0.7"/>
    <circle cx="405" cy="45"  r="1.0" fill="#ffd0e0" opacity="0.8"/>
    <circle cx="455" cy="22"  r="0.6" fill="#ffb3cc" opacity="0.65"/>
    <circle cx="370" cy="35"  r="0.9" fill="#ff6b9d" opacity="0.6"/>
    <circle cx="478" cy="55"  r="0.7" fill="#ffd0e0" opacity="0.55"/>
    <line x1="440" y1="9"  x2="440" y2="15" stroke="#ffd0e0" stroke-width="0.8" opacity="0.9"/>
    <line x1="437" y1="12" x2="443" y2="12" stroke="#ffd0e0" stroke-width="0.8" opacity="0.9"/>
    <line x1="415" y1="25" x2="415" y2="31" stroke="#ff6b9d" stroke-width="0.7" opacity="0.8"/>
