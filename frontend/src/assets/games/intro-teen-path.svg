<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" font-family="Arial, 'Segoe UI', sans-serif">
  <defs>
    <!-- Sky gradient: deep violet 鈫?warm amber -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a0533"/>
      <stop offset="32%"  stop-color="#4a1060"/>
      <stop offset="70%"  stop-color="#c75000"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>

    <!-- Left path glow: teal -->
    <linearGradient id="pathLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3c3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4fc3c3" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Right path glow: pink -->
    <linearGradient id="pathRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Button left -->
    <linearGradient id="btnLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6b7a"/>
      <stop offset="100%" stop-color="#0e9aa7"/>
    </linearGradient>

    <!-- Button right -->
    <linearGradient id="btnRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0305a"/>
      <stop offset="100%" stop-color="#e85d8a"/>
    </linearGradient>

    <!-- Story box blur effect -->
    <filter id="softBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Glow for paths -->
    <filter id="pathGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star glow -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for scene -->
    <clipPath id="sceneClip">
      <rect width="480" height="300"/>
    </clipPath>

    <!-- Character silhouette -->
    <symbol id="character" viewBox="-12 -40 24 40">
      <!-- Head -->
      <circle cx="0" cy="-34" r="6" fill="#1a0533"/>
      <!-- Body -->
      <rect x="-5" y="-28" width="10" height="16" rx="2" fill="#1a0533"/>
      <!-- Left leg -->
      <rect x="-5" y="-13" width="4" height="13" rx="2" fill="#1a0533"/>
      <!-- Right leg -->
      <rect x="1" y="-13" width="4" height="13" rx="2" fill="#1a0533"/>
      <!-- Left arm -->
      <rect x="-10" y="-27" width="5" height="3" rx="1.5" fill="#1a0533"/>
      <!-- Right arm -->
      <rect x="5" y="-27" width="5" height="3" rx="1.5" fill="#1a0533"/>
    </symbol>
  </defs>

  <!-- BACKGROUND SKY -->
  <rect width="480" height="300" fill="url(#sky)"/>

  <!-- STARS left side teal-tinted -->
  <g filter="url(#starGlow)">
    <circle cx="18"  cy="18"  r="1.2" fill="#b0f0f0" opacity="0.9"/>
    <circle cx="42"  cy="9"   r="0.8" fill="#c8fafa" opacity="0.8"/>
    <circle cx="66"  cy="24"  r="1.0" fill="#4fc3c3" opacity="0.95"/>
    <circle cx="30"  cy="42"  r="0.7" fill="#b0f0f0" opacity="0.7"/>
    <circle cx="88"  cy="14"  r="1.3" fill="#c8fafa" opacity="0.85"/>
    <circle cx="110" cy="32"  r="0.9" fill="#4fc3c3" opacity="0.8"/>
    <circle cx="52"  cy="55"  r="0.6" fill="#b0f0f0" opacity="0.6"/>
    <circle cx="75"  cy="48"  r="1.0" fill="#c8fafa" opacity="0.75"/>
    <circle cx="12"  cy="62"  r="0.8" fill="#4fc3c3" opacity="0.65"/>
    <line x1="66" y1="21" x2="66" y2="27" stroke="#4fc3c3" stroke-width="0.8" opacity="0.9"/>
    <line x1="63" y1="24" x2="69" y2="24" stroke="#4fc3c3" stroke-width="0.8" opacity="0.9"/>
    <line x1="88" y1="11" x2="88" y2="17" stroke="#c8fafa" stroke-width="0.7" opacity="0.85"/>
    <line x1="85" y1="14" x2="91" y2="14" stroke="#c8fafa" stroke-width="0.7" opacity="0.85"/>
  </g>

  <!-- STARS right side pink-tinted -->
