        font-size="8.5" fill="#ff6b9d" font-weight="600"
        text-anchor="middle" opacity="0.9" letter-spacing="0.5">
    CON 膼漂峄淣G TR脕NH
  </text>

  <!-- AMBIENT HORIZON GLOW -->
  <ellipse cx="240" cy="195" rx="55" ry="18"
           fill="#ff8c00" opacity="0.12"/>
  <ellipse cx="240" cy="198" rx="30" ry="10"
