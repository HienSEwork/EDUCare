    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    _
  </text>

  <!-- CHAPTER BADGE -->
  <rect x="16" y="72" width="80" height="22" rx="11"
        fill="#ff8c00"/>
  <rect x="17" y="73" width="78" height="20" rx="10"
        fill="#c75000"/>
  <text x="56" y="88"
        font-family="Arial, 'Segoe UI', sans-serif"
        font-size="10.5" fill="#fff5e0" font-weight="700"
        text-anchor="middle" letter-spacing="1.2">
    CH漂茽NG 2
  </text>

  <!-- CHOICE BUTTONS -->

  <!-- Left button shadow -->
  <rect x="25" y="256" width="196" height="38" rx="12"
        fill="#000000" opacity="0.35"/>
  <!-- Left button -->
  <rect x="24" y="254" width="196" height="38" rx="12"
