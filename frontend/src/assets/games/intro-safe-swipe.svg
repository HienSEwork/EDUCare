<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>

    <!-- Phone glass gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#252d3d"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>

    <!-- Phone screen gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2035"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Shield purple glow -->
    <filter id="shieldGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Red glow for danger arrow -->
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ef4444" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green glow for safe arrow -->
    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ghost shield glow backdrop -->
    <filter id="ghostGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Badge glow -->
    <filter id="badgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Phone edge highlight -->
    <linearGradient id="phoneEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Clip path for phone screen -->
    <clipPath id="screenClip">
      <rect x="177" y="62" width="126" height="186" rx="6"/>
    </clipPath>

    <!-- Side tint gradients -->
    <linearGradient id="dangerSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="safeSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="480" height="300" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04">
    <line x1="0" y1="60" x2="480" y2="60" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="480" y2="120" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="480" y2="180" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="480" y2="240" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="96" y1="0" x2="96" y2="300" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="300" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="288" y1="0" x2="288" y2="300" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="300" stroke="#8b5cf6" stroke-width="0.5"/>
  </g>

  <!-- GHOST SHIELD 鈥?oversized backdrop bleeds behind phone -->
  <path d="M240,22 L275,36 L275,75 Q275,105 240,118 Q205,105 205,75 L205,36 Z"
        fill="#6d28d9" fill-opacity="0.12"
        filter="url(#ghostGlow)"
        transform="scale(2.6) translate(-101, -8)"/>

  <!-- SHIELD 鈥?top center -->
  <g filter="url(#shieldGlow)">
    <path d="M240,14 L262,23 L262,48 Q262,66 240,74 Q218,66 218,48 L218,23 Z"
          fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
    <path d="M240,19 L258,27 L258,48 Q258,63 240,70 Q222,63 222,48 L222,27 Z"
          fill="none" stroke="#c4b5fd" stroke-width="0.8" stroke-opacity="0.5"/>
    <polyline points="231,44 237,51 250,38" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- PHONE FRAME -->
  <!-- Card stack - back card 2 (furthest) -->
  <rect x="186" y="70" width="122" height="180" rx="10"
        fill="#1e2840" opacity="0.5"
        transform="rotate(-4, 247, 160)"/>
  <!-- Card stack - back card 1 -->
  <rect x="183" y="67" width="124" height="182" rx="10"
        fill="#1c2539" opacity="0.7"
        transform="rotate(-2, 245, 158)"/>

  <!-- Phone body -->
  <rect x="170" y="48" width="140" height="220" rx="18"
        fill="url(#phoneGrad)"
        stroke="url(#phoneEdge)" stroke-width="1.5"/>

  <!-- Phone camera notch -->
  <rect x="225" y="54" width="30" height="6" rx="3" fill="#0d1117"/>
  <circle cx="261" cy="57" r="3" fill="#1a2035"/>

  <!-- Phone screen area -->
  <rect x="177" y="62" width="126" height="186" rx="6" fill="url(#screenGrad)"/>

  <!-- CARD INSIDE PHONE -->
  <g clip-path="url(#screenClip)">
    <!-- Card background white -->
    <rect x="185" y="72" width="110" height="142" rx="10"
          fill="#f8fafc"
          filter="url(#cardShadow)"/>

    <!-- Card top accent bar -->
    <rect x="185" y="72" width="110" height="6" rx="3" fill="#8b5cf6"/>
    <rect x="185" y="75" width="110" height="3" fill="#8b5cf6"/>

    <!-- Card icon area 鈥?warning symbol -->
    <circle cx="240" cy="104" r="16" fill="#fef3c7"/>
    <text x="240" y="110" font-family="Arial, 'Segoe UI', sans-serif" font-size="18" fill="#d97706"
          text-anchor="middle" font-weight="bold">!</text>

    <!-- Scenario label -->
    <rect x="196" y="123" width="88" height="12" rx="3" fill="#ede9fe"/>
    <text x="240" y="133" font-family="monospace, Courier New" font-size="7.5"
          fill="#7c3aed" text-anchor="middle" font-weight="600" letter-spacing="0.5">T脤NH HU峄怤G #03</text>

    <!-- Scenario text -->
    <text x="240" y="150" font-family="system-ui, sans-serif" font-size="8.5"
          fill="#1e293b" text-anchor="middle" font-weight="500">Ai 膽贸 y锚u c岷</text>
    <text x="240" y="163" font-family="system-ui, sans-serif" font-size="8.5"
          fill="#1e293b" text-anchor="middle" font-weight="500">膽峄媋 ch峄?nh脿...</text>

    <!-- Card detail text -->
    <text x="240" y="182" font-family="system-ui, sans-serif" font-size="6.5"
          fill="#64748b" text-anchor="middle">"Cho m矛nh bi岷縯 nh脿</text>
    <text x="240" y="192" font-family="system-ui, sans-serif" font-size="6.5"
          fill="#64748b" text-anchor="middle">b岷 峄?膽芒u nh茅?"</text>

    <!-- Swipe hint icons at card bottom -->
    <text x="200" y="208" font-family="system-ui" font-size="8" fill="#ef4444" opacity="0.7">鈫?/text>
    <text x="272" y="208" font-family="system-ui" font-size="8" fill="#22c55e" opacity="0.7">鈫?/text>

    <!-- Phone bottom home bar -->
    <rect x="215" y="235" width="50" height="3" rx="1.5" fill="#334155" opacity="0.6"/>
  </g>

  <!-- Phone side buttons -->
  <rect x="168" y="95" width="3" height="18" rx="1.5" fill="#1e2840"/>
  <rect x="168" y="118" width="3" height="12" rx="1.5" fill="#1e2840"/>
  <rect x="309" y="105" width="3" height="22" rx="1.5" fill="#1e2840"/>

  <!-- LEFT ARROW 鈥?DANGER -->
  <g filter="url(#redGlow)">
    <text x="78" y="160" font-family="system-ui, sans-serif" font-size="36"
          fill="#ef4444" text-anchor="middle" font-weight="900">鈫?/text>
  </g>
  <!-- NGUY HI峄侻 label -->
  <rect x="36" y="168" width="84" height="16" rx="4" fill="#ef4444" fill-opacity="0.15"
        stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="78" y="180" font-family="monospace, Courier New" font-size="7.5"
        fill="#f87171" text-anchor="middle" font-weight="700" letter-spacing="1">NGUY HI峄侻 鈿?/text>

  <!-- Side tint overlays -->
  <rect x="0" y="0" width="160" height="300"
        fill="url(#dangerSide)" opacity="0.06"/>
  <rect x="320" y="0" width="160" height="300"
        fill="url(#safeSide)" opacity="0.06"/>

  <!-- RIGHT ARROW 鈥?SAFE -->
  <g filter="url(#greenGlow)">
    <text x="402" y="160" font-family="system-ui, sans-serif" font-size="36"
          fill="#22c55e" text-anchor="middle" font-weight="900">鈫?/text>
  </g>
  <!-- AN TO脌N label -->
  <rect x="360" y="168" width="84" height="16" rx="4" fill="#22c55e" fill-opacity="0.15"
        stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="402" y="180" font-family="monospace, Courier New" font-size="7.5"
        fill="#4ade80" text-anchor="middle" font-weight="700" letter-spacing="1">AN TO脌N 鉁?/text>

  <!-- SWIPE GESTURE CURVE -->
  <path d="M240,185 Q275,175 305,162" fill="none"
        stroke="#a78bfa" stroke-width="1.8"
        stroke-dasharray="3,4" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrowhead at end of swipe arc -->
  <polygon points="305,156 312,163 303,168" fill="#a78bfa" opacity="0.7"/>
  <!-- Finger dot start -->
  <circle cx="240" cy="185" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="240" cy="185" r="2" fill="#c4b5fd" opacity="0.8"/>

  <!-- BADGE 鈥?top right -->
  <g filter="url(#badgeGlow)">
    <rect x="355" y="14" width="100" height="22" rx="11"
          fill="#1e1040" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="405" y="29" font-family="monospace, Courier New" font-size="8"
          fill="#c4b5fd" text-anchor="middle" font-weight="700" letter-spacing="0.5">30 T脤NH HU峄怤G</text>
  </g>

  <!-- PROGRESS DOTS 鈥?5 dots, 2 filled purple -->
  <g transform="translate(240, 280)">
    <circle cx="-32" cy="0" r="4" fill="#8b5cf6"/>
    <circle cx="-16" cy="0" r="4" fill="#8b5cf6"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="16" cy="0" r="4" fill="none" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="32" cy="0" r="4" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  </g>

  <!-- GAME TITLE (subtle, bottom left) -->
  <text x="18" y="288" font-family="monospace, Courier New" font-size="8"
        fill="#4b5563" letter-spacing="2" font-weight="600">SAFE SWIPE</text>
  <text x="18" y="297" font-family="monospace, Courier New" font-size="6"
        fill="#374151" letter-spacing="1">v1.0 路 Digital Safety</text>
</svg>