<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <!-- Background grid pattern (surveillance monitor aesthetic) -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2340" stroke-width="0.4" opacity="0.6"/>
    </pattern>

    <!-- Scanline overlay pattern -->
    <pattern id="scanlines" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#000" opacity="0.12"/>
    </pattern>

    <!-- Glow filter - blue -->
    <filter id="blueGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#2a6fd4" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter - red -->
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e03535" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Magnifying glass lens glow -->
    <filter id="lensGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#1a50b0" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title glow -->
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#2a6fd4" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette radial gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0d14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- Monitor screen gradient -->
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1525" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080c18" stop-opacity="1"/>
    </linearGradient>

    <!-- Lens glass gradient -->
    <radialGradient id="lensGrad" cx="38%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#1a3a7a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0d2255" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#081540" stop-opacity="0.95"/>
    </radialGradient>

    <!-- Lens shimmer -->
    <radialGradient id="lensShimmer" cx="30%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#5090e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2a6fd4" stop-opacity="0"/>
    </radialGradient>

    <!-- Star badge gradient -->
    <radialGradient id="starGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a7fe8"/>
      <stop offset="100%" stop-color="#1a50b0"/>
    </radialGradient>

    <!-- Score badge gradient -->
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="100%" stop-color="#0f2255"/>
    </linearGradient>

    <!-- Warning badge gradient -->
    <radialGradient id="warnGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#c02020"/>
    </radialGradient>

    <!-- Clip path for monitor screen -->
    <clipPath id="screenClip">
      <rect x="18" y="48" width="218" height="228" rx="3"/>
    </clipPath>
  </defs>

  <!-- LAYER 1: Ground + atmosphere -->

  <!-- Base dark ground -->
  <rect width="480" height="300" fill="#0a0d14"/>

  <!-- Grid pattern -->
  <rect width="480" height="300" fill="url(#grid)"/>

  <!-- Vignette -->
  <rect width="480" height="300" fill="url(#vignette)"/>

  <!-- LAYER 2: Monitor / chat pane -->

  <!-- Monitor outer shell -->
  <rect x="14" y="44" width="226" height="236" rx="5" fill="#0e1624" stroke="#1e3060" stroke-width="1.5"/>

  <!-- Monitor top bar (status bar) -->
  <rect x="14" y="44" width="226" height="20" rx="5" fill="#0f1e3a"/>
  <rect x="14" y="54" width="226" height="10" fill="#0f1e3a"/>

  <!-- Status bar dots -->
  <circle cx="26" cy="54" r="3.5" fill="#e03535" opacity="0.85"/>
  <circle cx="38" cy="54" r="3.5" fill="#e8a020" opacity="0.85"/>
  <circle cx="50" cy="54" r="3.5" fill="#20b040" opacity="0.85"/>

  <!-- Status bar label -->
  <text x="127" y="57" font-family="monospace" font-size="7" fill="#4a70b0" text-anchor="middle" letter-spacing="1">CHAT MONITOR v2.1</text>

  <!-- Monitor screen area -->
  <rect x="18" y="64" width="218" height="212" rx="3" fill="url(#monitorGrad)"/>

  <!-- Scanlines over screen -->
  <rect x="18" y="64" width="218" height="212" rx="3" fill="url(#scanlines)"/>

  <!-- Screen inner border glow line -->
  <rect x="18" y="64" width="218" height="212" rx="3" fill="none" stroke="#1a3a7a" stroke-width="0.8" opacity="0.7"/>

  <!-- CHAT CONVERSATION -->

  <!-- Conversation header inside monitor -->
  <rect x="20" y="66" width="214" height="18" fill="#0c1830" opacity="0.9"/>
  <circle cx="32" cy="75" r="5" fill="#1a3a7a"/>
  <text x="32" y="78" font-family="monospace" font-size="7" fill="#7ab0ff" text-anchor="middle">?</text>
  <text x="44" y="78" font-family="monospace" font-size="7" fill="#5080c8" letter-spacing="0.5">Ng瓢峄漣 l岷?#47</text>
  <circle cx="218" cy="75" r="3" fill="#20b040" opacity="0.8"/>

  <!-- BUBBLE 1 (incoming) -->
  <rect x="24" y="92" width="145" height="32" rx="6" fill="#0f1e3a" stroke="#1e3a6a" stroke-width="0.8"/>
  <!-- Bubble tail left -->
  <path d="M 24 104 L 18 108 L 24 112" fill="#0f1e3a" stroke="#1e3a6a" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Bubble text line 1 -->
  <text x="34" y="107" font-family="monospace" font-size="7.2" fill="#8ab4e8" letter-spacing="0.2">Cho t峄?膽峄媋 ch峄?/text>
  <!-- Bubble text line 2 -->
  <text x="34" y="118" font-family="monospace" font-size="7.2" fill="#8ab4e8" letter-spacing="0.2">nh脿 b岷 nh茅?</text>
  <!-- Timestamp -->
  <text x="172" y="130" font-family="monospace" font-size="6" fill="#2a4a80" text-anchor="end">20:14</text>

  <!-- WARNING TRIANGLE overlaid on bubble 1 -->
  <g filter="url(#redGlow)">
    <path d="M 155 88 L 166 106 L 144 106 Z" fill="url(#warnGrad)" stroke="#ff3333" stroke-width="0.8"/>
    <text x="155" y="103" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- BUBBLE 2 (outgoing) -->
  <rect x="82" y="135" width="140" height="26" rx="6" fill="#1a1e28" stroke="#2a3050" stroke-width="0.8"/>
  <!-- Bubble tail right -->
  <path d="M 222 145 L 228 149 L 222 153" fill="#1a1e28" stroke="#2a3050" stroke-width="0.8" stroke-linejoin="round"/>
  <text x="90" y="152" font-family="monospace" font-size="7.5" fill="#b0bcd8" letter-spacing="0.3">峄? sao v岷瓂?</text>
  <text x="82" y="167" font-family="monospace" font-size="6" fill="#2a3860">20:15</text>

  <!-- BUBBLE 3 (incoming) -->
  <rect x="24" y="175" width="160" height="26" rx="6" fill="#0f1e3a" stroke="#1e3a6a" stroke-width="0.8"/>
  <path d="M 24 185 L 18 189 L 24 193" fill="#0f1e3a" stroke="#1e3a6a" stroke-width="0.8" stroke-linejoin="round"/>
  <text x="34" y="192" font-family="monospace" font-size="7.2" fill="#8ab4e8" letter-spacing="0.2">T峄?mu峄憂 g岷穚</text>
  <text x="34" y="193" dy="10" font-family="monospace" font-size="7.2" fill="#8ab4e8" letter-spacing="0.2">b岷 th么i...</text>
  <text x="187" y="207" font-family="monospace" font-size="6" fill="#2a4a80" text-anchor="end">20:16</text>

  <!-- TYPING INDICATOR -->
  <rect x="24" y="214" width="50" height="18" rx="9" fill="#0c1830" stroke="#1a3060" stroke-width="0.7" opacity="0.9"/>
  <circle cx="37" cy="223" r="3" fill="#4a70b0" opacity="0.9"/>
  <circle cx="49" cy="223" r="3" fill="#4a70b0" opacity="0.6"/>
  <circle cx="61" cy="223" r="3" fill="#4a70b0" opacity="0.35"/>

  <!-- Monitor bottom bar -->
  <rect x="18" y="258" width="218" height="16" rx="2" fill="#090d18" opacity="0.9"/>
  <text x="29" y="269" font-family="monospace" font-size="6" fill="#1a3a6a" letter-spacing="0.8">PH脗N T脥CH...</text>
  <!-- Analysis bar -->
  <rect x="90" y="263" width="100" height="5" rx="2" fill="#0d1a38"/>
  <rect x="90" y="263" width="72" height="5" rx="2" fill="#1a50b0" opacity="0.8"/>
  <!-- Percentage -->
  <text x="198" y="269" font-family="monospace" font-size="6" fill="#2a6fd4">72%</text>

  <!-- LAYER 3: MAGNIFYING GLASS (right hero) -->

  <!-- Handle shadow/depth -->
  <rect x="383" y="214" width="14" height="72" rx="7" transform="rotate(38, 390, 250)" fill="#060810" opacity="0.5"/>

  <!-- Handle -->
  <rect x="377" y="210" width="15" height="74" rx="7.5" transform="rotate(38, 384, 247)" fill="#0e1a3a" stroke="#1a3a6a" stroke-width="1.2"/>
  <!-- Handle grip lines -->
  <line x1="371" y1="244" x2="380" y2="236" stroke="#2a5090" stroke-width="1" opacity="0.6"/>
  <line x1="375" y1="250" x2="384" y2="242" stroke="#2a5090" stroke-width="1" opacity="0.6"/>
  <line x1="379" y1="256" x2="388" y2="248" stroke="#2a5090" stroke-width="1" opacity="0.6"/>
  <line x1="383" y1="262" x2="392" y2="254" stroke="#2a5090" stroke-width="1" opacity="0.6"/>
  <line x1="387" y1="268" x2="396" y2="260" stroke="#2a5090" stroke-width="1" opacity="0.6"/>

  <!-- Outer ring (rim of magnifying glass) -->
  <circle cx="330" cy="160" r="82" fill="none" stroke="#0e1e44" stroke-width="10" filter="url(#lensGlow)" opacity="0.6"/>
  <circle cx="330" cy="160" r="82" fill="none" stroke="#1e3a7a" stroke-width="7"/>
  <circle cx="330" cy="160" r="82" fill="none" stroke="#2a5aaa" stroke-width="1.5" opacity="0.8"/>

  <!-- Lens fill (glass) -->
  <circle cx="330" cy="160" r="75" fill="url(#lensGrad)" opacity="0.95"/>

  <!-- Lens shimmer highlight -->
  <circle cx="330" cy="160" r="75" fill="url(#lensShimmer)"/>

  <!-- Subtle concentric rings inside lens -->
  <circle cx="330" cy="160" r="60" fill="none" stroke="#1a4080" stroke-width="0.5" opacity="0.4"/>
  <circle cx="330" cy="160" r="44" fill="none" stroke="#1a4080" stroke-width="0.4" opacity="0.3"/>

  <!-- Cross-hair lines in lens -->
  <line x1="295" y1="160" x2="365" y2="160" stroke="#1e4a8a" stroke-width="0.6" opacity="0.4"/>
  <line x1="330" y1="125" x2="330" y2="195" stroke="#1e4a8a" stroke-width="0.6" opacity="0.4"/>

  <!-- "?" inside magnifying glass -->
  <text x="330" y="180" font-family="Arial, 'Segoe UI', sans-serif" font-size="72" fill="#3a80e8" text-anchor="middle" font-weight="bold" opacity="0.85" filter="url(#blueGlow)">?</text>

  <!-- Lens edge glint (top-left arc) -->
  <path d="M 275 125 A 75 75 0 0 1 340 88" fill="none" stroke="#6090e0" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- LAYER 4: TITLE -->

  <!-- Title backing strip -->
  <rect x="90" y="10" width="302" height="26" rx="3" fill="#080c18" opacity="0.7"/>
  <rect x="90" y="10" width="302" height="1" fill="#2a5aaa" opacity="0.5"/>
  <rect x="90" y="35" width="302" height="1" fill="#1a3a6a" opacity="0.4"/>

  <!-- Title text -->
  <text x="241" y="28" font-family="'Courier New', Courier, monospace" font-size="16" fill="#4a90f8" text-anchor="middle" font-weight="bold" letter-spacing="3" filter="url(#titleGlow)">TH脕M T峄?ONLINE</text>

  <!-- Subtitle / tagline -->
  <text x="241" y="43" font-family="'Courier New', Courier, monospace" font-size="7" fill="#2a5090" text-anchor="middle" letter-spacing="2">膼I峄€U TRA CU峄楥 TR脪 CHUY峄哊</text>

  <!-- LAYER 5: DETECTIVE BADGE (top-left) -->

  <!-- Star badge (8-point star) -->
  <g transform="translate(50, 22)" filter="url(#blueGlow)">
    <!-- Outer star points -->
    <polygon points="0,-16 3.8,-5.2 14.7,-8.5 7.4,1.9 14.7,12.3 3.8,9 0,20 -3.8,9 -14.7,12.3 -7.4,1.9 -14.7,-8.5 -3.8,-5.2" fill="url(#starGrad)" stroke="#4a80e8" stroke-width="0.8"/>
    <!-- Badge inner circle -->
    <circle cx="0" cy="2" r="7" fill="#0d1e44" stroke="#3a70d8" stroke-width="0.8"/>
    <!-- Badge text -->
    <text x="0" y="5" font-family="monospace" font-size="6" fill="#6aa8f8" text-anchor="middle" font-weight="bold">TT</text>
  </g>

  <!-- Badge label below star -->
  <text x="50" y="48" font-family="'Courier New', Courier, monospace" font-size="6" fill="#2a5090" text-anchor="middle" letter-spacing="1">TH脕M T峄?/text>

  <!-- LAYER 6: SCORE BADGE (top-right) -->

  <!-- Score badge backing -->
  <rect x="416" y="8" width="56" height="36" rx="4" fill="url(#scoreGrad)" stroke="#1e3a7a" stroke-width="1"/>
  <rect x="416" y="8" width="56" height="1" fill="#3a70c8" opacity="0.6"/>

  <!-- Score label -->
  <text x="444" y="21" font-family="'Courier New', Courier, monospace" font-size="6.5" fill="#4a70b0" text-anchor="middle" letter-spacing="1">膼I峄侻 S峄?/text>

  <!-- Score value -->
  <text x="444" y="37" font-family="'Courier New', Courier, monospace" font-size="14" fill="#4a90f8" text-anchor="middle" font-weight="bold" filter="url(#blueGlow)">85</text>

  <!-- Score unit -->
  <text x="468" y="37" font-family="'Courier New', Courier, monospace" font-size="7" fill="#2a5090">膽</text>

  <!-- LAYER 7: Final atmospheric overlays -->

  <!-- Scanlines across entire image (subtle) -->
  <rect width="480" height="300" fill="url(#scanlines)" opacity="0.35"/>

  <!-- Edge vignette final pass -->
  <rect width="480" height="300" fill="url(#vignette)" opacity="0.5"/>

  <!-- Bottom status strip -->
  <rect x="0" y="282" width="480" height="18" fill="#060910" opacity="0.9"/>
  <line x1="0" y1="282" x2="480" y2="282" stroke="#1a3060" stroke-width="0.5"/>
  <text x="12" y="294" font-family="monospace" font-size="6.5" fill="#1a3a6a" letter-spacing="1.2">CASE #0047</text>
  <text x="240" y="294" font-family="monospace" font-size="6.5" fill="#1a3a6a" text-anchor="middle" letter-spacing="0.8">鈼?膼ANG THEO D脮I</text>
  <text x="468" y="294" font-family="monospace" font-size="6.5" fill="#1a3a6a" text-anchor="end" letter-spacing="0.5">M峄– 膼峄? CAO</text>

</svg>