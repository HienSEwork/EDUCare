server:
  port: ${PORT:8081}

spring:
  application:
    name: educare-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/educare1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${APP_JWT_SECRET:replace-this-secret-with-a-very-long-random-string}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:168}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@educare.vn}
    password: ${APP_ADMIN_PASSWORD:Admin@123}
    full-name: ${APP_ADMIN_FULL_NAME:EDUcare Admin}
    username: ${APP_ADMIN_USERNAME:educare_admin}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  payos:
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
