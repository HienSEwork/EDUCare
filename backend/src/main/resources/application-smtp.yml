spring:
  config:
    activate:
      on-profile: smtp
  mail:
    host: smtp.gmail.com
    port: 587
    protocol: smtp
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

app:
  frontend:
    url: http://localhost:5173
